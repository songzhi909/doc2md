<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doc2md 文档转换工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>doc2md 文档转换工具</h1>

        <div class="form-section">
            <div class="form-group">
                <label>源文件夹：</label>
                <div class="input-row">
                    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none" onchange="handleFolderSelect(this)">
                    <input type="text" id="inputPath" placeholder="请选择文件夹" readonly>
                    <button onclick="document.getElementById('folderInput').click()">选择文件夹</button>
                    <button id="scanBtn" onclick="scanFiles()">扫描</button>
                </div>
            </div>

            <div class="form-group">
                <label for="outputPath">输出文件夹路径：</label>
                <div class="input-row">
                    <input type="text" id="outputPath" value="./output" placeholder="输出文件夹路径">
                    <button onclick="openFolderBrowser()">浏览...</button>
                </div>
            </div>
        </div>

        <div id="scanResult" class="result-section" style="display:none;">
            <h3>扫描结果</h3>
            <div id="fileList" class="file-list"></div>
            <button id="convertBtn" onclick="convertFiles()" disabled>开始转换</button>
        </div>

        <div id="progressSection" class="result-section" style="display:none;">
            <h3>转换进度</h3>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <div id="progressText" class="progress-text">准备中...</div>
            <div id="progressDetail" class="progress-detail"></div>
        </div>

        <div id="convertResult" class="result-section" style="display:none;">
            <h3>转换结果</h3>
            <div id="stats"></div>
            <div id="failures" style="display:none;">
                <h4>失败文件：</h4>
                <ul id="failureList"></ul>
            </div>
            <button id="exportBtn" onclick="exportZip()" style="display:none;">导出 ZIP</button>
        </div>
    </div>

    <script>
        let scannedFiles = [];
        let selectedFiles = [];
        let lastOutputPath = '';

        function handleFolderSelect(input) {
            const files = input.files;
            if (files.length > 0) {
                // 获取文件夹名称（从第一个文件的相对路径）
                const firstPath = files[0].webkitRelativePath;
                const folderName = firstPath.split('/')[0];
                document.getElementById('inputPath').value = folderName + ' (' + files.length + ' 个文件)';
                selectedFiles = files;
            }
        }

        function scanFiles() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件夹');
                return;
            }

            // 构建文件列表
            const fileList = [];
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const relativePath = file.webkitRelativePath;
                // 去掉第一级文件夹名称
                const pathParts = relativePath.split('/');
                const path = pathParts.slice(1).join('/');
                fileList.push({
                    path: path,
                    size: file.size,
                    name: file.name
                });
            }

            // 过滤支持的格式
            const supportedExts = [
                'pdf', 'doc', 'docx', 'xlsx', 'pptx',
                'csv', 'json', 'xml',
                'html', 'htm',
                'epub',
                'txt', 'md'
            ];
            const supportedFiles = fileList.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return supportedExts.includes(ext);
            });

            scannedFiles = supportedFiles.map(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return {
                    path: f.path,
                    size: f.size,
                    type: ext
                };
            });

            displayScanResult(scannedFiles);
            document.getElementById('convertBtn').disabled = false;
        }

        function displayScanResult(files) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = files.map(f =>
                `<div class="file-item">
                    <span class="file-path">${f.path}</span>
                    <span class="file-size">${formatSize(f.size)}</span>
                    <span class="file-type">${f.type}</span>
                </div>`
            ).join('');

            document.getElementById('scanResult').style.display = 'block';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function convertFiles() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件夹');
                return;
            }

            const outputPath = document.getElementById('outputPath').value;
            document.getElementById('convertBtn').disabled = true;
            document.getElementById('convertBtn').textContent = '转换中...';
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('convertResult').style.display = 'none';
            document.getElementById('exportBtn').style.display = 'none';

            // 上传文件并转换（使用流式接口）
            const formData = new FormData();
            formData.append('output_path', outputPath);

            for (let i = 0; i < selectedFiles.length; i++) {
                formData.append('files', selectedFiles[i]);
            }

            fetch('/api/convert-stream', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            return;
                        }

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = JSON.parse(line.slice(6));
                                handleProgressEvent(data);
                            }
                        }

                        read();
                    });
                }

                read();
            })
            .catch(error => {
                alert('请求失败: ' + error);
                document.getElementById('convertBtn').disabled = false;
                document.getElementById('convertBtn').textContent = '开始转换';
            });
        }

        function handleProgressEvent(data) {
            switch (data.type) {
                case 'start':
                    document.getElementById('progressText').textContent = `共 ${data.total} 个文件`;
                    document.getElementById('progressDetail').textContent = '';
                    break;

                case 'progress':
                    const percent = Math.round((data.current / data.total) * 100);
                    document.getElementById('progressFill').style.width = percent + '%';
                    document.getElementById('progressText').textContent =
                        `${data.current} / ${data.total} (${percent}%)`;
                    document.getElementById('progressDetail').textContent =
                        `${data.success ? '✓' : '✗'} ${data.file}`;
                    break;

                case 'complete':
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = '转换完成';
                    document.getElementById('progressDetail').textContent =
                        `成功: ${data.converted}  失败: ${data.failed}`;

                    const result = {
                        success: true,
                        converted: data.converted,
                        failed: data.failed,
                        failures: data.failures,
                        output_path: document.getElementById('outputPath').value
                    };
                    displayConvertResult(result);

                    document.getElementById('convertBtn').disabled = false;
                    document.getElementById('convertBtn').textContent = '开始转换';
                    break;

                case 'error':
                    alert('转换失败: ' + data.error);
                    document.getElementById('convertBtn').disabled = false;
                    document.getElementById('convertBtn').textContent = '开始转换';
                    break;
            }
        }

        function displayConvertResult(data) {
            document.getElementById('stats').innerHTML =
                `<p>✓ 成功: ${data.converted}  ✗ 失败: ${data.failed}</p>`;

            if (data.failures && data.failures.length > 0) {
                document.getElementById('failureList').innerHTML =
                    data.failures.map(f =>
                        `<li>${f.file}: ${f.error}</li>`
                    ).join('');
                document.getElementById('failures').style.display = 'block';
            }

            // 存储输出路径并显示导出按钮
            if (data.output_path && data.converted > 0) {
                lastOutputPath = data.output_path;
                document.getElementById('exportBtn').style.display = 'inline-block';
            }

            document.getElementById('convertResult').style.display = 'block';
        }

        function exportZip() {
            if (!lastOutputPath) {
                alert('没有可导出的文件');
                return;
            }

            const btn = document.getElementById('exportBtn');
            btn.disabled = true;
            btn.textContent = '导出中...';

            fetch('/api/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ output_path: lastOutputPath })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => { throw new Error(data.error); });
                }
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'converted_docs.zip';
                a.click();
                URL.revokeObjectURL(url);
            })
            .catch(error => {
                alert('导出失败: ' + error.message);
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '导出 ZIP';
            });
        }

        // 文件夹浏览器相关变量
        let currentBrowsePath = '';

        function openFolderBrowser() {
            const modal = document.getElementById('folderBrowserModal');
            modal.style.display = 'block';
            browseTo('');
        }

        // 回车键导航
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('browsePath').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    browseTo(this.value);
                }
            });
        });

        function closeFolderBrowser() {
            const modal = document.getElementById('folderBrowserModal');
            modal.style.display = 'none';
        }

        function browseTo(path) {
            fetch('/api/browse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    currentBrowsePath = data.current_path;
                    document.getElementById('browsePath').value = currentBrowsePath;
                    displayBrowseItems(data.items);
                } else {
                    alert('浏览失败: ' + data.error);
                }
            })
            .catch(error => {
                alert('请求失败: ' + error);
            });
        }

        function displayBrowseItems(items) {
            const container = document.getElementById('browseItems');
            container.innerHTML = '';

            if (items.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'browse-empty';
                emptyDiv.textContent = '此文件夹为空';
                container.appendChild(emptyDiv);
                return;
            }

            items.forEach(item => {
                if (item.is_dir) {
                    const div = document.createElement('div');
                    div.className = 'browse-item browse-dir';
                    div.textContent = '📁 ' + item.name;
                    div.addEventListener('click', () => browseTo(item.path));
                    container.appendChild(div);
                }
            });
        }

        function selectCurrentFolder() {
            document.getElementById('outputPath').value = currentBrowsePath;
            closeFolderBrowser();
        }

        function browseParent() {
            if (currentBrowsePath) {
                const parentPath = currentBrowsePath.replace(/[\\/][^\\/]+[\\/]?$/, '');
                browseTo(parentPath || '');
            }
        }
    </script>

    <!-- 文件夹浏览器弹窗 -->
    <div id="folderBrowserModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择输出文件夹</h3>
                <span class="modal-close" onclick="closeFolderBrowser()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="browse-nav">
                    <input type="text" id="browsePath" placeholder="输入路径后按回车或点击前往">
                    <button onclick="browseTo(document.getElementById('browsePath').value)">前往</button>
                    <button onclick="browseParent()">⬆ 上级</button>
                    <button onclick="browseTo(currentBrowsePath)">🔄</button>
                </div>
                <div id="browseItems" class="browse-list"></div>
            </div>
            <div class="modal-footer">
                <button onclick="selectCurrentFolder()">选择此文件夹</button>
                <button onclick="closeFolderBrowser()">取消</button>
            </div>
        </div>
    </div>
</body>
</html>
