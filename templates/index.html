<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doc2md 文档转换工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>doc2md 文档转换工具</h1>

        <div class="form-section">
            <div class="form-group">
                <label>源文件夹：</label>
                <div class="input-row">
                    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none" onchange="handleFolderSelect(this)">
                    <input type="text" id="inputPath" placeholder="请选择文件夹" readonly>
                    <button onclick="document.getElementById('folderInput').click()">选择文件夹</button>
                    <button id="scanBtn" onclick="scanFiles()">扫描</button>
                </div>
            </div>

            <div class="form-group">
                <label for="outputPath">输出文件夹路径：</label>
                <input type="text" id="outputPath" value="./output" placeholder="输出文件夹路径">
            </div>
        </div>

        <div id="scanResult" class="result-section" style="display:none;">
            <h3>扫描结果</h3>
            <div id="fileList" class="file-list"></div>
            <button id="convertBtn" onclick="convertFiles()" disabled>开始转换</button>
        </div>

        <div id="convertResult" class="result-section" style="display:none;">
            <h3>转换结果</h3>
            <div id="stats"></div>
            <div id="failures" style="display:none;">
                <h4>失败文件：</h4>
                <ul id="failureList"></ul>
            </div>
        </div>
    </div>

    <script>
        let scannedFiles = [];
        let selectedFiles = [];

        function handleFolderSelect(input) {
            const files = input.files;
            if (files.length > 0) {
                // 获取文件夹名称（从第一个文件的相对路径）
                const firstPath = files[0].webkitRelativePath;
                const folderName = firstPath.split('/')[0];
                document.getElementById('inputPath').value = folderName + ' (' + files.length + ' 个文件)';
                selectedFiles = files;
            }
        }

        function scanFiles() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件夹');
                return;
            }

            // 构建文件列表
            const fileList = [];
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const relativePath = file.webkitRelativePath;
                // 去掉第一级文件夹名称
                const pathParts = relativePath.split('/');
                const path = pathParts.slice(1).join('/');
                fileList.push({
                    path: path,
                    size: file.size,
                    name: file.name
                });
            }

            // 过滤支持的格式
            const supportedExts = [
                'pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx',
                'csv', 'json', 'xml',
                'html', 'htm',
                'epub',
                'txt', 'md', 'rtf'
            ];
            const supportedFiles = fileList.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return supportedExts.includes(ext);
            });

            scannedFiles = supportedFiles.map(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return {
                    path: f.path,
                    size: f.size,
                    type: ext
                };
            });

            displayScanResult(scannedFiles);
            document.getElementById('convertBtn').disabled = false;
        }

        function displayScanResult(files) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = files.map(f =>
                `<div class="file-item">
                    <span class="file-path">${f.path}</span>
                    <span class="file-size">${formatSize(f.size)}</span>
                    <span class="file-type">${f.type}</span>
                </div>`
            ).join('');

            document.getElementById('scanResult').style.display = 'block';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function convertFiles() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件夹');
                return;
            }

            const outputPath = document.getElementById('outputPath').value;
            document.getElementById('convertBtn').disabled = true;
            document.getElementById('convertBtn').textContent = '转换中...';

            // 上传文件并转换
            const formData = new FormData();
            formData.append('output_path', outputPath);

            for (let i = 0; i < selectedFiles.length; i++) {
                formData.append('files', selectedFiles[i]);
            }

            fetch('/api/convert', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    displayConvertResult(data);
                } else {
                    alert('转换失败: ' + data.error);
                }
                document.getElementById('convertBtn').disabled = false;
                document.getElementById('convertBtn').textContent = '开始转换';
            })
            .catch(error => {
                alert('请求失败: ' + error);
                document.getElementById('convertBtn').disabled = false;
                document.getElementById('convertBtn').textContent = '开始转换';
            });
        }

        function displayConvertResult(data) {
            document.getElementById('stats').innerHTML =
                `<p>✓ 成功: ${data.converted}  ✗ 失败: ${data.failed}</p>`;

            if (data.failures && data.failures.length > 0) {
                document.getElementById('failureList').innerHTML =
                    data.failures.map(f =>
                        `<li>${f.file}: ${f.error}</li>`
                    ).join('');
                document.getElementById('failures').style.display = 'block';
            }

            document.getElementById('convertResult').style.display = 'block';
        }
    </script>
</body>
</html>
